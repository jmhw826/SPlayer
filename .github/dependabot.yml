version: 2
updates:
  - package-ecosystem: "npm"  # 虽然名称是 npm，但支持 pnpm
    directory: "/"
    schedule:
      interval: "daily"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 10
    reviewers:
      - "IamFurina"
    labels:
      - "dependencies"
    # 关键配置：允许生成 lockfile
    allow:
      - dependency-type: "all"
    # 强制基于 lockfile 更新
    versioning-strategy: "lockfile-only"
    # 移除 registries 字段（Dependabot 自动识别 npm 源）